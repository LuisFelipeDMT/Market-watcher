# Egress allowlist for the collector's OS user (mw-collector): it may reach the
# brokerage/B3 (and DNS) and nothing else. So even if the collector is
# compromised it cannot exfiltrate to an arbitrary host.
#
# Usage: resolve the allowed domains to IPs (they change — refresh via a timer)
# and load with `nft -f deploy/nftables.conf`. UID must match mw-collector.
#
# Find the uid:  id -u mw-collector

define COLLECTOR_UID = 1500          # <-- set to `id -u mw-collector`
define ALLOWED_V4 = { 0.0.0.0/0 }    # <-- replace with resolved XP/B3 IPs

table inet collector_egress {
    chain output {
        type filter hook output priority 0; policy accept;

        # Only constrain the collector user.
        meta skuid != $COLLECTOR_UID accept

        # Loopback + the Unix socket path are local; always fine.
        oif "lo" accept

        # DNS (so domain resolution works) — restrict to your resolver if you can.
        udp dport 53 accept
        tcp dport 53 accept

        # Allow HTTPS only to the resolved brokerage/B3 addresses.
        ip daddr $ALLOWED_V4 tcp dport 443 accept

        # Everything else from the collector is dropped.
        meta skuid $COLLECTOR_UID drop
    }
}
